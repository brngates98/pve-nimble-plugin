name: Release
run-name: Release-${{ github.ref_name }}-${{ github.run_number }}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    tags:
    - 'v[0-9]+.[0-9]+.[0-9]+'
    - 'v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]'
    - 'v[0-9]+.[0-9]+.[0-9]+-beta.[0-9]'

jobs:
  validate-tag:
    name: Validate release tag
    runs-on: ubuntu-22.04
    steps:
    - run: |
        echo ${{ github.ref }}
    - if: ${{ github.ref_type != 'tag' }}
      run: |
        echo "::error::${{ github.ref }} branch is not a release tag"; exit 1

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Perl test deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libjson-perl

      - name: Run unit tests
        run: ./tests/run_tests.sh

  plugin-syntax-bookworm:
    name: Plugin syntax (bookworm + Proxmox PVE 8)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Verify NimbleStoragePlugin.pm in Docker
        run: |
          chmod +x scripts/verify_plugin_in_docker.sh
          DIST=bookworm ./scripts/verify_plugin_in_docker.sh

  plugin-syntax-trixie:
    name: Plugin syntax (trixie + Proxmox PVE 9)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Verify NimbleStoragePlugin.pm in Docker
        run: |
          chmod +x scripts/verify_plugin_in_docker.sh
          DIST=trixie ./scripts/verify_plugin_in_docker.sh

  build:
    name: Make deb package
    needs:
    - validate-tag
    - unit-tests
    - plugin-syntax-bookworm
    - plugin-syntax-trixie
    uses: ./.github/workflows/_deb.yml
    secrets: inherit

  release:
    name: Release
    needs:
    - build
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.ref }}

    - id: artifact-download
      uses: actions/download-artifact@v4
      with:
        name: deb-artifact-${{ github.sha }}

    - name: Prepare release notes
      run: |
        NOTES=".github/release-notes-${{ github.ref_name }}.md"
        if [ ! -f "$NOTES" ]; then
          echo "::error::Missing release notes file: $NOTES"
          echo "Add a comprehensive .github/release-notes-${{ github.ref_name }}.md before tagging (see .github/release-notes-v0.0.8.md as a template)."
          exit 1
        fi
        cp "$NOTES" release-notes.md

    - uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        body_path: release-notes.md
        generate_release_notes: false
        make_latest: true
        prerelease: ${{ contains(github.ref_name, '-rc.') || contains(github.ref_name, '-beta.') }}
        files: |
          *.deb
          sha256sums

  apt-repo:
    name: APT repo (GitHub Pages)
    needs:
    - build
    runs-on: ubuntu-22.04
    environment: github-pages
    steps:
    - uses: actions/download-artifact@v4
      with:
        name: deb-artifact-${{ github.sha }}

    - name: Set up APT repo layout
      run: |
        mkdir -p apt/pool/main
        mkdir -p apt/dists/bookworm/main/binary-all
        mkdir -p apt/dists/trixie/main/binary-all
        cp *.deb apt/pool/main/

    - name: Generate Packages (bookworm)
      run: |
        cd apt
        apt-ftparchive packages pool/main > dists/bookworm/main/binary-all/Packages
        gzip -c dists/bookworm/main/binary-all/Packages > dists/bookworm/main/binary-all/Packages.gz

    - name: Generate Packages (trixie)
      run: |
        cp apt/dists/bookworm/main/binary-all/Packages     apt/dists/trixie/main/binary-all/Packages
        cp apt/dists/bookworm/main/binary-all/Packages.gz  apt/dists/trixie/main/binary-all/Packages.gz

    - name: Generate Release (bookworm)
      run: |
        cat > release-bookworm.conf << 'EOF'
        APT::FTPArchive::Release::Codename "bookworm";
        APT::FTPArchive::Release::Architectures "all";
        APT::FTPArchive::Release::Components "main";
        APT::FTPArchive::Release::Description "PVE Nimble Storage Plugin";
        EOF
        cd apt && apt-ftparchive -c ../release-bookworm.conf release dists/bookworm > dists/bookworm/Release

    - name: Generate Release (trixie)
      run: |
        cat > release-trixie.conf << 'EOF'
        APT::FTPArchive::Release::Codename "trixie";
        APT::FTPArchive::Release::Architectures "all";
        APT::FTPArchive::Release::Components "main";
        APT::FTPArchive::Release::Description "PVE Nimble Storage Plugin";
        EOF
        cd apt && apt-ftparchive -c ../release-trixie.conf release dists/trixie > dists/trixie/Release

    - uses: actions/upload-pages-artifact@v3
      with:
        path: apt

  deploy-pages:
    name: Deploy APT repo to Pages
    needs:
    - apt-repo
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
    - uses: actions/deploy-pages@v4
