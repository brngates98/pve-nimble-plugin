name: Release
run-name: Release-${{ github.ref_name }}-${{ github.run_number }}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    tags:
    - 'v[0-9]+.[0-9]+.[0-9]+'
    - 'v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]'
    - 'v[0-9]+.[0-9]+.[0-9]+-beta.[0-9]'

jobs:
  test:
    name: Test release tag
    runs-on: ubuntu-22.04
    steps:
    - run: |
        echo ${{ github.ref }}
    - if: ${{ github.ref_type != 'tag' }}
      run: |
        echo "::error::${{ github.ref }} branch is not a release tag"; exit 1

  build:
    name: Make deb package
    needs:
    - test
    uses: ./.github/workflows/_deb.yml
    secrets: inherit

  release:
    name: Release
    needs:
    - build
    runs-on: ubuntu-22.04
    steps:
    - id: artifact-download
      uses: actions/download-artifact@v8
      with:
        name: deb-artifact-${{ github.sha }}

    - uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        generate_release_notes: true
        make_latest: true
        prerelease: false
        files: |
          *.deb
          sha256sums

  apt-repo:
    name: APT repo (GitHub Pages)
    needs:
    - build
    runs-on: ubuntu-22.04
    environment: github-pages
    steps:
    - uses: actions/download-artifact@v8
      with:
        name: deb-artifact-${{ github.sha }}

    - name: Set up APT repo layout
      run: |
        mkdir -p apt/pool/main apt/dists/bookworm/main/binary-all
        cp *.deb apt/pool/main/

    - name: Generate Packages
      run: |
        cd apt && apt-ftparchive packages pool/main > dists/bookworm/main/binary-all/Packages
        gzip -c dists/bookworm/main/binary-all/Packages > dists/bookworm/main/binary-all/Packages.gz

    - name: Generate Release
      run: |
        cat > release.conf << 'EOF'
        APT::FTPArchive::Release::Codename "bookworm";
        APT::FTPArchive::Release::Architectures "all";
        APT::FTPArchive::Release::Components "main";
        APT::FTPArchive::Release::Description "PVE Nimble Storage Plugin";
        EOF
        cd apt && apt-ftparchive -c ../release.conf release dists/bookworm > dists/bookworm/Release

    - uses: actions/upload-pages-artifact@v3
      with:
        path: apt

  deploy-pages:
    name: Deploy APT repo to Pages
    needs:
    - apt-repo
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
    - uses: actions/deploy-pages@v4
